# 推荐：复制到用户目录（npx skills update 不会覆盖）
#
#   macOS/Linux:
#     mkdir -p ~/.config/image-generate
#     cp profiles.example.yaml ~/.config/image-generate/profiles.yaml
#
#   Windows:
#     %APPDATA%\image-generate\profiles.yaml
#
# 默认直接写 api_key 明文即可（个人本机最省事）。
# 可选：api_key_env / api_key_file。

active: nikoapi

profiles:
  nikoapi:
    type: openai_compatible
    base_url: https://nikoapi.xyz/v1
    # 默认：明文写在这里
    api_key: "sk-你的密钥"
    # 可选：
    # api_key_env: NIKOAPI_API_KEY
    # api_key_file: ./key.txt
    model: gpt-image-2
    timeout: 600
    response_format_b64_json: false
    options:
      display_name: Niko API
      price: 约 0.03 元/张
      resolution: 仅 1K
      recommended_sizes:
        - "1024x1024"
        - "1536x1024"
        - "1024x1536"
      note: >
        实际输出多为 1K 档（如约 1672×941 或 1024 档）。
        请求 2k/4k 往往不报错，但像素仍接近 1K，请按 1K 选型与计费。

  # 再加供应商：复制一段，改 id / base_url / api_key / options 即可
  # other:
  #   type: openai_compatible
  #   base_url: https://api.example.com/v1
  #   api_key: "sk-..."
  #   model: gpt-image-2
  #   timeout: 600
  #   options:
  #     display_name: 示例
  #     price: …
  #     resolution: …
  #     recommended_sizes: ["1024x1024"]
  #     note: …
